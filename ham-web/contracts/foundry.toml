[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[rpc_endpoints]
megaeth = "https://mainnet.megaeth.com/rpc"

[etherscan]
megaeth = { key = "${ETHERSCAN_API_KEY}", url = "https://megaeth.com/api" }
